name: Pinact

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - .github/pinact.yaml
      - .github/actions/**
      - .github/workflows/*.yml
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  pinact:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pinact
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          skip_push: "true"
          min_age: "7"
